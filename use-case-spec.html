  <script id="md-source" type="text/markdown"># 서버 예약/할당 관리 시스템

## 유스케이스 명세서

UC 20개 / 카테고리 6개

> 원본: `소프트웨어공학_01_4조_유스케이스_명세서.pdf` (23 페이지, 2026년 5월 13일) — 컴퓨터공학부 소프트웨어공학 (01) 팀 프로젝트 · 4조

---

## 시스템 개요

### 문제 분석

연구실이나 팀에서 GPU, 서버 같은 장비를 여러 명이 공유할 때 흔히 생기는 상황이 있다. 누가 지금 쓰고 있는지 모르고 SSH로 접속해보니 이미 다른 사람이 쓰고 있거나, 서로 겹쳐서 쓰다가 학습이 충돌하거나, 아무도 안 쓰는 것 같은데 잡아놓은 사람이 있어서 못 쓰거나. 이 시스템은 이런 상황을 해소하려는 목적에서 설계되었다.

호텔 예약과 유사하게 생각할 수 있다. 학생/연구원은 원하는 서버를 원하는 기간만큼 예약하고, 사용한 뒤 반납한다. 팀 관리자(교수)는 팀원별로 쓸 수 있는 한도(Quota)를 정해서 특정 사람이 서버를 독점하지 못하게 관리한다. 서버 관리자는 서버를 시스템에 등록하거나 점검 일정을 잡는 등 인프라 전체를 관리한다.

(→ 기존의 스마트팩토리 주제는 광범위하며 도메인 지식이 충분치 않았기에 주제를 변경하였습니다.)

### 등장인물 요약

- **학생(STU)** — 서버를 직접 예약하고 사용하는 주 사용자. 팀에 배정된 Quota 한도 안에서 자유롭게 예약할 수 있고, 한도를 넘으면 팀장에게 승인을 요청한다.
- **팀 관리자(MGR)** — 주로 교수나 팀장. 팀원별 Quota를 설정하고, 팀원이 한도 초과 요청을 보내오면 승인 또는 거절한다.
- **서버 관리자(ADM)** — 시스템 전체 관리자. 서버를 등록·삭제하고, 점검 일정을 잡고, 전체 운영 현황을 모니터링한다.
- **모니터링 시스템(SYS)** — 사람이 아닌 자동화 주체. 1분 주기로 사용률을 수집하거나, 예약이 만료되면 자동으로 반납 처리하는 등 시스템이 스스로 실행하는 작업들을 담당한다.

### 사용 흐름

대부분의 사용은 아래 흐름을 따른다. 각 단계가 어느 유스케이스에 해당하는지 함께 표기했다.

| 단계 | 행동 | 설명 | 관련 UC |
|------|------|------|---------|
| **1** | 서버 목록 확인 | 어떤 서버가 AVAILABLE 상태인지, 사양은 어떤지 확인한다. | UC01 |
| **2** | 예약 또는 즉시 사용 요청 | 사용할 기간을 정해서 예약하거나(UC04), 지금 당장 빈 서버를 바로 할당받는다(UC05). | UC04 / UC05 |
| **3** | Quota 확인 및 승인 분기 | 잔여 Quota가 충분하면 바로 예약이 확정된다. 한도를 넘으면 팀장에게 승인 요청이 자동 생성되고(ApprovalRequest), 팀장이 승인(UC09)하면 예약이 확정된다. | UC09 / UC17 |
| **4** | 서버 사용 | 예약된 서버에 접속해서 작업을 수행한다. 이 상태가 IN_USE. | - |
| **5** | 반납 또는 자동 만료 | 작업이 끝나면 직접 반납하거나(UC07), 예약 기간이 지나면 시스템이 자동으로 반납 처리한다(UC16). 30분 이상 유휴 상태가 감지되면 자동 회수 경고도 발송된다(UC15). | UC07 / UC15 / UC16 |

## 용어 설명

| 용어 | 설명 |
|------|------|
| **Quota** | 팀 또는 개인이 동시에 점유할 수 있는 서버 사용 한도(일 수 기준). 서버를 반납하면 사용한 만큼 자동으로 회복된다. |
| **서버 상태** | AVAILABLE: 지금 바로 예약 가능 / RESERVED: 기간이 선점된 상태 / IN_USE: 현재 사용 중 / MAINTENANCE: 점검 중 |
| **낙관적 잠금 (optimistic lock)** | 두 사람이 같은 서버를 동시에 예약하려 할 때 충돌을 막는 기법. 서버마다 version 번호를 두고, 저장 직전에 번호가 바뀌어 있으면 뒤늦은 요청을 자동으로 취소하고 안내한다. (Database의 optimistic lock 방식과 같다) |
| **ApprovalRequest** | Quota 한도를 초과해 예약하려 할 때 자동으로 생성되는 관리자 허가 건. 상태: PENDING(대기) → APPROVED(승인) / REJECTED(거절) / AUTO_REJECTED(72시간 무응답 자동 거절) |
| **Reservation (예약)** | 서버 예약 한 건의 기록. 사용자, 서버, 기간, 상태 정보 등을 담는다. |
| **Notification (알림)** | 시스템이 사용자에게 보내는 내부 알림 기록. 사용자가 읽으면 확인 시각(readAt)이 기록된다. |

## 조회 그룹

서버 현황과 예약 현황을 읽어오는 기능들이다. 시스템에서 가장 자주 호출되는 읽기 전용 기능으로, 모든 액터가 사용한다. 권한에 따라 보이는 범위가 다르다. 학생은 자기 팀 정보만, 팀 관리자는 팀 전체, 서버 관리자는 시스템 전체를 볼 수 있다.

### 유스케이스 UC01 — 서버 현황 조회

| 항목 | 내용 |
|------|------|
| **일차 액터** | 학생(STU), 팀 관리자(MGR), 서버 관리자(ADM) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 사용자 목표 |

**주요 성공 시나리오**
1. 사용자가 로그인 후 "서버 현황" 메뉴를 연다.
2. 시스템이 사용자 권한에 맞게 서버 목록을 보여준다. (학생: 가용 여부 중심 / 팀 관리자: 팀 우선 / 서버 관리자: 전체)
3. 시스템이 각 서버의 상태(AVAILABLE / RESERVED / IN_USE / MAINTENANCE), 사양, 점유자를 표시한다.
4. 사용자가 원하는 서버 정보를 확인한다.

**확장·실패 시나리오**
- **[A1] 필터 적용** — 사양/그룹/상태로 필터링하면 조건에 맞는 서버만 보여준다.
- **[A2] 정렬** — 사양·이름·상태 기준 정렬을 지원한다.
- **[A3] 자동 새로고침** — 화면이 열려 있는 동안 약 1분 주기로 자동 갱신된다.
- **[E1] 조회 결과 없음** — 등록 서버가 없거나 필터 조건에 해당하는 서버가 없으면 "404 - 표시할 서버가 없습니다"를 표시한다.
- **[E2] 타팀 정보 접근** — 학생(STU)이 다른 팀 점유자를 조회하면 실명 대신 팀 코드로만 표시한다. (수평적 접근 제한)
- **[E3] 백엔드 오류** — 5XX 응답 시 자동으로 3회 재시도하고, 그래도 실패하면 캐시된 마지막 상태와 함께 "최신화 실패" 알림을 표시한다.

### 유스케이스 UC02 — 예약 현황 조회

| 항목 | 내용 |
|------|------|
| **일차 액터** | 학생(STU), 팀 관리자(MGR), 서버 관리자(ADM) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 사용자 목표 |

**주요 성공 시나리오**
1. 사용자가 "내 예약" 또는 "예약 현황" 메뉴를 연다.
2. 시스템이 권한에 맞게 예약 목록을 보여준다. (학생: 본인 예약 / 팀 관리자: 팀 예약 / 서버 관리자: 전체 예약)
3. 시스템이 각 예약의 서버명·기간·상태를 표시한다.
4. 사용자가 본인 예약을 선택하면 예약 취소(UC06) 또는 서버 반납(UC07) 버튼이 활성화된다.

**확장·실패 시나리오**
- **[A1] 상태 필터** — 활성 예약(RESERVED+IN_USE)만 또는 종료된 예약만 볼 수 있다.
- **[A2] 기간 필터** — 오늘/이번 주/직접 지정 범위로 필터링할 수 있다.
- **[A3] 대기열 보기** — 대기열에 등록된 항목을 별도 섹션으로 확인할 수 있다.
- **[E1] 권한 초과 접근** — 학생(STU)이 URL을 조작해 다른 사람의 예약을 조회하려 하면 403으로 거부한다.
- **[E2] 예약 없음** — 조회 결과가 없으면 "표시할 예약이 없습니다"를 안내한다.

## 알림 그룹

시스템이 사용자에게 보내는 알림을 정의하는 기능들이다. 유스케이스 명세서에서 "하위 기능"으로 분류된 이유는, 이 알림들이 단독으로 시작되는 게 아니라 다른 UC(예약, 승인 등)의 결과로 자동 발생하기 때문이다. UC03-a는 승인/거절 결과를 전달하고, UC03-d는 예약 직전에 다른 사람이 먼저 잡아가는 충돌 상황을 실시간으로 안내한다.

### 유스케이스 UC03-a — 예약 승인/거절 알림 수신

| 항목 | 내용 |
|------|------|
| **일차 액터** | 학생(STU) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 하위 기능 |

**주요 성공 시나리오**
1. 팀 관리자(MGR)가 초과 요청 승인/거절(UC09)을 완료하거나, 시스템이 승인 타임아웃 자동 거절(UC17)을 처리한다.
2. 시스템이 학생(STU)에게 알림을 생성한다.
3. 학생(STU)의 알림함 상단에 새 알림 배지가 표시된다.
4. 학생(STU)이 알림함을 열어 결과를 확인한다.
5. (승인) 알림에 예약 확정 정보(서버, 기간)와 "예약 보기" 링크가 포함된다.
6. (거절) 알림에 거절 사유와 "다시 요청" 또는 "다른 서버 보기" 링크가 포함된다.

**확장·실패 시나리오**
- **[A1] 자동 거절(UC17)** — 72시간 무응답으로 자동 거절된 경우 "팀 관리자가 72시간 동안 응답하지 않아 자동 거절되었습니다" 문구가 포함된다.
- **[A2] 부분 승인** — 기간이 단축되어 승인된 경우 단축된 기간이 알림에 명시되고 사용자 확인 액션이 추가된다.
- **[E1] 알림 수신 비활성화** — 학생(STU)이 알림을 꺼둔 상태라면 다음 로그인 시 누적 알림으로 표시된다.

### 유스케이스 UC03-d — 예약 충돌 알림 수신

| 항목 | 내용 |
|------|------|
| **일차 액터** | 학생(STU) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 하위 기능 |

**주요 성공 시나리오**
1. 학생(STU)이 서버 예약 요청(UC04)을 시도하던 중, 다른 사용자가 0.1초 먼저 같은 서버를 예약해 낙관적 잠금 충돌이 발생한다.
2. 시스템이 학생(STU)의 트랜잭션을 롤백한다.
3. 시스템이 현재 AVAILABLE 상태인 대안 서버 목록을 최대 5건 조회한다 (동일·유사 사양 우선).
4. 시스템이 학생(STU)의 화면에 즉시 모달 알림을 띄운다.
5. 학생(STU)이 대안 서버 중 하나를 선택하면 해당 서버로 서버 예약 요청(UC04)을 다시 시작한다.

**확장·실패 시나리오**
- **[A1] 대안 서버 없음** — "현재 사용 가능한 대체 서버가 없습니다." 안내를 표시한다.
- **[A2] 모달 닫기** — 학생(STU)이 모달을 닫으면 흐름이 종료되고 알림은 알림함에 누적된다.
- **[E1] 대안 서버도 점유** — 선택한 서버도 점유되면 UC-03d 흐름이 다시 실행되며 다른 여유 서버들을 찾는다. (없을 경우 A1)

## 예약 및 할당 그룹

이 시스템의 핵심 기능들이다. 서버를 예약하고(UC04), 즉시 할당받고(UC05), 예약을 취소하거나(UC06), 사용을 마치고 반납하는(UC07) 전체 생명주기를 다룬다. UC04와 UC05의 차이는 미래 기간을 선점하는 "예약형"이냐, 지금 당장 빈 서버를 받는 "즉시 할당형"의 차이이다. 네 UC 모두 optimistic lock을 사용하고, 성공/실패 결과가 알림 그룹(UC03-\*)으로 연결된다.

### 유스케이스 UC04 — 서버 예약 요청 (예약형)

| 항목 | 내용 |
|------|------|
| **일차 액터** | 학생(STU) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 사용자 목표 |

**주요 성공 시나리오**
1. 학생(STU)이 서버 목록에서 원하는 서버와 사용 기간(시작~종료)을 입력한다.
2. 시스템이 해당 서버의 상태(AVAILABLE이어야 함)와 version 값을 조회한다.
3. 시스템이 학생(STU)의 팀 Quota 잔여량을 확인한다.
4. 잔여량이 충분하면 시스템이 낙관적 잠금으로 서버 상태를 RESERVED로 변경하고 version을 증가시킨다.
5. 시스템이 Reservation을 생성하고 Quota.used를 증가시킨다 (단일 트랜잭션).
6. 시스템이 예약 확정 결과를 학생(STU)에게 표시한다.

**확장·실패 시나리오**
- **[A1] Quota 초과** — 잔여량이 부족하면 Quota 초과 요청(UC08)으로 분기한다. "팀 관리자에게 승인을 요청하시겠습니까?" 선택을 제공한다.
- **[A2] 즉시 사용으로 전환** — 사용자가 즉시 사용을 선택하면 즉시 서버 요청(UC05)으로 흐름을 넘긴다.
- **[E1] 낙관적 잠금 충돌** — version 불일치로 UPDATE가 거부되면 트랜잭션을 롤백하고 예약 충돌 알림(UC03-d)을 발송한다. 대안 서버 목록을 안내한다.
- **[E2] 점검 등록으로 상태 변경** — 조회 후 저장 전 선택한 서버가 MAINTENANCE로 상태가 바뀐다면, 트랜잭션이 실패하고 "서버 점검 중"을 안내한다.

### 유스케이스 UC05 — 즉시 서버 요청

| 항목 | 내용 |
|------|------|
| **일차 액터** | 학생(STU) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 사용자 목표 |

**주요 성공 시나리오**
1. 학생(STU)이 "즉시 서버 사용" 버튼을 누르고 원하는 사양 조건을 선택한다.
2. 시스템이 조건에 맞는 AVAILABLE 서버 1대를 선정한다.
3. 시스템이 학생(STU)의 팀 Quota 잔여량을 확인한다.
4. 잔여량이 충분하면 시스템이 낙관적 잠금으로 서버 상태를 즉시 IN_USE로 전환하고 Reservation을 생성한다 (startTime = now).
5. 시스템이 학생(STU)에게 할당된 서버 정보(IP, 사양)를 표시한다.

**확장·실패 시나리오**
- **[A1] 가용 서버 없음** — 현 시점에서 사용 가능한 서버가 없으면 대기열에 등록하고 "대기 N번째"를 안내한다. 이후 다른 사용자가 반납하면 자동으로 할당된다.
- **[A2] Quota 초과** — 잔여량이 부족하면 Quota 초과 요청(UC08)으로 분기한다.
- **[E1] 낙관적 잠금 충돌** — 다음 후보 서버로 자동 재시도한다 (최대 3회). 실패 시 A1에 따라 대기열로 이동한다.

### 유스케이스 UC06 — 예약 취소

| 항목 | 내용 |
|------|------|
| **일차 액터** | 학생(STU) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 사용자 목표 |

**주요 성공 시나리오**
1. 학생(STU)이 예약 현황(UC02)에서 취소할 예약을 선택한다. (RESERVED 상태, 사용 시작 전)
2. 시스템이 예약 소유자가 학생(STU)인지, 상태가 RESERVED인지 확인한다.
3. 시스템이 Reservation.status = CANCELED, Server.status = AVAILABLE로 변경한다 (낙관적 잠금, 단일 트랜잭션).
4. 시스템이 Quota.used를 감소시킨다.
5. 시스템이 학생(STU)에게 취소 완료를 표시한다.
6. 대기열에 다음 사용자가 있으면 즉시 서버 요청(UC05) 흐름으로 자동 할당을 시도한다.

**확장·실패 시나리오**
- **[E1] 이미 사용 시작** — 상태가 IN_USE이면 "서버 반납(UC07)을 이용하세요"를 안내한다.
- **[E2] 타인 예약 취소 시도** — 소유자가 다르면 403으로 거부한다.
- **[E3] 낙관적 잠금 충돌** — 동시 취소·반납으로 version 불일치 발생 시 재조회 후 1회 재시도하고, 재시도도 실패하면 실패 안내를 표시한다.

### 유스케이스 UC07 — 서버 반납 (조기 반납)

| 항목 | 내용 |
|------|------|
| **일차 액터** | 학생(STU) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 사용자 목표 |

**주요 성공 시나리오**
1. 학생(STU)이 예약 현황(UC02)에서 사용 중인 예약을 선택하고 "반납" 버튼을 누른다.
2. 시스템이 예약 소유자와 상태(IN_USE)를 확인한다.
3. 시스템이 Reservation.status = RETURNED, endTime = now, Server.status = AVAILABLE로 변경한다 (단일 트랜잭션).
4. 시스템이 Quota.used를 감소시킨다.
5. 시스템이 학생(STU)에게 반납 완료를 표시한다.
6. 대기열에 다음 사용자가 있으면 그 사용자에게 알림을 발송한다.

**확장·실패 시나리오**
- **[A1] 만료 직전 반납** — 만료 임박 상태여도 학생(STU)이 먼저 반납하면 그 시점을 종료 시각으로 기록한다. 예약 만료 자동 반납(UC16)은 발동하지 않는다.
- **[E1] 이미 반납됨** — 상태가 RETURNED/CANCELED이면 "이미 종료된 예약입니다"를 안내한다.
- **[E2] 타인 반납 시도** — 소유자가 다르면 403으로 거부한다.
- **[E3] 낙관적 잠금 충돌** — 유휴 서버 감지 및 자동 회수(UC15)나 예약 만료 자동 반납(UC16)과 동시에 처리될 경우 충돌을 감지하고 "이미 시스템이 회수 처리했습니다"를 안내한다.

## Quota(사용량) 및 추가 Quota 승인 그룹

팀 단위 사용량 제한(Quota)을 관리하고, 한도 초과 요청에 대한 승인 워크플로우를 정의하는 기능들이다.

### 유스케이스 UC09 — 초과 요청 승인/거절

| 항목 | 내용 |
|------|------|
| **일차 액터** | 팀 관리자(MGR) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 사용자 목표 |

**주요 성공 시나리오**
1. 팀 관리자(MGR)가 허가함에서 처리할 요청을 선택한다.
2. 시스템이 요청 상세(요청자, 서버, 기간, 사유, 팀 현재 사용량)를 보여준다.
3. 팀 관리자(MGR)가 "승인" 또는 "거절"을 선택한다. (거절 시 사유 입력 필수)
4. 시스템이 ApprovalRequest.status를 APPROVED 또는 REJECTED로 변경하고 처리 시각과 처리자를 기록한다.
5. (승인) 시스템이 이번 예약에 한해 학생(STU)의 Quota 초과를 허용하고 서버 예약 요청(UC04) 또는 즉시 서버 요청(UC05) 흐름을 재개하여 예약을 확정한다.
6. (거절) 호출 UC는 최종 실패로 종료한다.
7. 시스템이 학생(STU)에게 결과를 알림으로 전송한다.

**확장·실패 시나리오**
- **[A1] 부분 승인** — 팀 관리자(MGR)가 요청 기간을 단축(예: 7일 → 3일)하여 승인하면 단축된 기간으로 예약이 확정된다.
- **[A2] 관리자 대리 허가** — 팀 관리자(MGR)가 부재한 경우 서버 관리자(ADM)가 본 UC를 대신 수행한다.
- **[E1] 허가 시점 서버 상태 변경** — 대상 서버가 이미 다른 사용자에게 점유되었으면 대안 서버를 제안하거나 자동으로 실패 처리한다.
- **[E2] 타임아웃 경합** — 허가 진행 중 72시간이 초과되어 승인 타임아웃 자동 거절(UC17)이 발동하면 본 UC 트랜잭션이 우선 처리되고 UC17은 처리 없이 종료된다.
- **[E3] 권한 오류** — 팀 관리자(MGR)가 해당 팀 소속이 아니면 403으로 거부한다.

### 유스케이스 UC10 — 팀원별 Quota 설정

| 항목 | 내용 |
|------|------|
| **일차 액터** | 팀 관리자(MGR) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 사용자 목표 |

**주요 성공 시나리오**
1. 팀 관리자(MGR)가 팀 관리 화면에서 "팀원별 Quota 설정"을 연다.
2. 시스템이 팀원 목록과 각 팀원의 현재 Quota 한도·사용량을 보여준다.
3. 팀 관리자(MGR)가 특정 팀원의 새 Quota 한도값을 입력한다.
4. 시스템이 팀원 전체 Quota 합계가 팀 전체 한도를 초과하지 않는지 검증한다.
5. 검증을 통과하면 시스템이 Quota.limit을 업데이트한다 (트랜잭션).
6. 팀 관리자(MGR)에게 갱신 결과를, 영향을 받은 팀원에게 변경 사실을 알림으로 전달한다.

**확장·실패 시나리오**
- **[A1] 일괄 균등 분배** — "균등 분배" 옵션을 선택하면 팀 Quota를 팀원 수로 나눠 자동으로 값을 채워준다.
- **[A2] 0으로 설정** — 해당 팀원은 신규 예약이 불가능해진다. 진행 중인 예약은 유지된다.
- **[E1] 합계 초과** — 팀 전체 한도를 초과하면 저장에 실패하고 초과량을 안내한다.
- **[E2] 사용량보다 낮은 한도** — Quota.limit이 현재 Quota.used보다 작으면 경고 후 확인을 요구한다.
- **[E3] 동시 수정 충돌** — 다른 팀 관리자(MGR)가 같은 팀을 동시에 수정하면 낙관적 잠금으로 나중에 시도한 트랜잭션을 롤백한다.

## 서버 관리 그룹

서버 자원 자체를 관리하는 서버 관리자(ADM) 전용 기능들이다. 일종의 서버 CRUD를 담당하며, 서버의 상태 변경 또한 이 그룹에서 담당한다.

### 유스케이스 UC11 — 서버 등록

| 항목 | 내용 |
|------|------|
| **일차 액터** | 서버 관리자(ADM) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 사용자 목표 |

**주요 성공 시나리오**
1. 서버 관리자(ADM)가 서버 관리 화면에서 "신규 서버 등록"을 연다.
2. 서버 관리자(ADM)가 서버 정보(이름, IP, 사양 - CPU/RAM/GPU 등)를 입력한다.
3. 시스템이 입력값을 검증한다 (IP 형식, 중복 여부, 사양 필수 항목).
4. 시스템이 서버 레코드를 생성한다 (status = AVAILABLE, version = 1).
5. 시스템이 서버 관리자(ADM)에게 등록 완료를 표시하고 신규 서버를 목록에 추가한다.

**확장·실패 시나리오**
- **[A1] 그룹 지정** — 서버 그룹(예: "Lab-A GPU")을 함께 지정할 수 있다.
- **[A2] 점검 상태로 시작** — "점검 중으로 등록" 옵션을 선택하면 status = MAINTENANCE로 생성한다.
- **[E1] 필수 필드 누락** — 사양 필드 일부가 비어있으면 저장을 거부한다.
- **[E2] DB 오류** — 트랜잭션 실패 시 오류 메시지를 표시하고 운영 로그를 남긴다.

### 유스케이스 UC12 — 서버 삭제

| 항목 | 내용 |
|------|------|
| **일차 액터** | 서버 관리자(ADM) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 사용자 목표 |

**주요 성공 시나리오**
1. 서버 관리자(ADM)가 서버 관리 화면에서 삭제할 서버를 선택한다.
2. 시스템이 활성 예약(RESERVED 또는 IN_USE) 존재 여부를 확인한다.
3. 활성 예약이 없으면 시스템이 확인 대화상자를 표시한다.
4. 서버 관리자(ADM)가 확인하면 시스템이 deletedAt = now를 기록하여 soft delete 처리한다.
5. 시스템이 서버 관리자(ADM)에게 삭제 완료를 표시하고 목록을 갱신한다.

**확장·실패 시나리오**
- **[A1] 점검 상태 삭제** — MAINTENANCE 상태 서버는 활성 예약 확인을 건너뛰고 바로 삭제할 수 있다.
- **[A2] 그룹 일괄 삭제** — 그룹 단위로 다중 선택 후 삭제할 수 있다.
- **[E1] 활성 예약 존재** — "활성 예약이 있어 삭제할 수 없습니다. 점검 모드로 전환 후 만료를 기다리세요"를 안내하고 삭제를 거부한다.
- **[E2] 동시 예약 발생** — 확인 직후 새 예약이 들어오면 트랜잭션 재검사로 충돌을 감지하고 삭제를 취소한다.
- **[E3] 수집 데이터 보존** — 서버 삭제 후에도 실시간 사용률 수집(UC14)이 저장한 과거 데이터는 보존된다.

### 유스케이스 UC13 — 서버 점검 스케줄 등록

| 항목 | 내용 |
|------|------|
| **일차 액터** | 서버 관리자(ADM) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 사용자 목표 |

**주요 성공 시나리오**
1. 서버 관리자(ADM)가 대상 서버를 선택하고 "점검 스케줄 등록"을 연다.
2. 서버 관리자(ADM)가 점검 시작/종료 시각과 사유를 입력한다.
3. 시스템이 해당 기간과 겹치는 RESERVED 예약이 있는지 확인한다.
4. 충돌이 없으면 시스템이 점검 일정(MaintenanceSchedule)을 등록한다.
5. 시스템 스케줄러가 시작 시각에 서버를 MAINTENANCE로, 종료 시각에 AVAILABLE로 자동 전환한다.
6. 서버 관리자(ADM)에게 등록 완료를 표시한다.

**확장·실패 시나리오**
- **[A1] 즉시 점검** — 시작 시각을 "지금"으로 지정하면 활성 예약이 없는 경우 즉시 MAINTENANCE로 전환한다.
- **[A2] 반복 점검** — 주기 점검(예: 매주 일요일 02:00~04:00) 등록을 지원한다.
- **[E1] 활성 예약 충돌** — 두 가지 선택을 제공한다. a) 시각 변경, b) 영향받는 예약자에게 알림 후 강제 등록 (서버 관리자 ADM 한정).
- **[E2] IN_USE와 겹침** — 사용자 동의/통지 후에만 등록 가능하다. 강제 등록 시 종료 시점에 강제 반납 처리한다.
- **[E3] 잘못된 기간** — 시작 ≥ 종료 시각이면 저장을 거부한다.
- **[E4] 동시 등록** — 같은 서버·같은 시간대에 중복 등록이 들어오면 나중에 시도한 트랜잭션을 롤백한다.

## 자동화 그룹

사람이 개입하지 않아도 시스템이 주기적으로 스스로 실행하는 기능들이다. 데이터 수집, 이상 감지, 자원 회수를 이 그룹에서 담당한다.

### 유스케이스 UC14 — 실시간 사용률 수집

| 항목 | 내용 |
|------|------|
| **일차 액터** | 모니터링 시스템(SYS) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 하위 기능 |

**주요 성공 시나리오**
1. 시스템 스케줄러가 1분 주기로 본 UC를 시작한다.
2. 시스템이 삭제되지 않은 전체 서버 목록을 조회한다.
3. 시스템이 각 서버에 CPU·메모리·네트워크 사용률 요청을 병렬로 보낸다.
4. 각 응답의 형식과 값 범위를 검증하고 수집 시각과 함께 시계열 저장소에 기록한다.
5. 저장된 데이터는 서버 현황 조회(UC01)와 유휴 서버 감지 및 자동 회수(UC15)의 입력으로 사용된다.

**확장·실패 시나리오**
- **[A1] 폴링 → 푸시 전환** — 에이전트가 푸시를 지원하면 시스템이 폴링 대신 수신 대기 모드로 전환한다.
- **[A2] 점검 중 제외** — MAINTENANCE 상태 서버는 수집 대상에서 제외하거나 N/A로 기록한다.
- **[A3] 다운샘플링** — 장기 보관 데이터는 다운샘플링 정책에 따라 해상도를 단계적으로 낮춰 저장한다.
- **[E1] 응답 없음** — 응답 시간 초과 시 MISSING으로 기록하고, 일정 횟수 연속 누락되면 서버 관리자(ADM)에게 경고를 보낸다.
- **[E2] 형식 오류** — 검증 실패 시 해당 데이터를 폐기하고 운영 로그를 남긴다.
- **[E3] 저장 장애** — 메모리 버퍼에 임시 보관하다가 복구되면 재기록한다 (버퍼가 가득 차면 가장 오래된 데이터부터 폐기).
- **[E4] 시각 불일치** — 에이전트 시각과 시스템 시각의 차이가 허용 범위를 초과하면 시스템 시각으로 통일한다.

### 유스케이스 UC15 — 유휴 서버 감지 및 자동 회수

| 항목 | 내용 |
|------|------|
| **일차 액터** | 모니터링 시스템(SYS) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 하위 기능 |

**주요 성공 시나리오**
1. 시스템 스케줄러가 1분 주기로 본 UC를 시작한다.
2. 시스템이 IN_USE 상태 서버 각각의 최근 30분간 평균 CPU 사용률을 계산한다.
3. 평균 사용률이 5% 미만인 서버를 유휴 후보로 표시한다.
4. 시스템이 유휴 후보를 점유 중인 학생(STU)에게 유휴 회수 경고 알림을 발송한다.
5. 시스템이 회수 예정 시각(알림 발송 후 15분)을 기록한다.
6. 회수 예정 시각에 도달하면 시스템이 사용률을 다시 확인한다.
7. 여전히 5% 미만이면 시스템이 Reservation.status = RECLAIMED, Server.status = AVAILABLE로 변경한다 (트랜잭션).
8. 시스템이 회수 완료 사실을 학생(STU)에게 추가 알림으로 전송한다.

**확장·실패 시나리오**
- **[A1] 사용 중 표시** — 유휴 회수 경고 알림(UC03-b)에서 학생(STU)이 "사용 중임을 표시"하면 유휴 타이머를 초기화하고 회수를 취소한다.
- **[A2] 직접 반납** — 학생(STU)이 서버 반납(UC07)을 실행하면 본 UC의 회수는 처리 없이 종료된다.
- **[E1] 알림 발송 실패** — 경고 알림 발송에 실패하면 회수를 보류하고 다음 주기에 재시도한다 (경고 없이 회수하지 않음).
- **[E2] 낙관적 잠금 충돌** — 서버 반납(UC07), 예약 취소(UC06), 예약 만료 자동 반납(UC16)과 경합 시 본 UC의 회수는 처리 없이 종료된다.
- **[E3] 정책 미설정** — 정책 값이 설정되지 않았으면 즉시 종료하고 서버 관리자(ADM)에게 경고 로그를 남긴다.

### 유스케이스 UC16 — 예약 만료 자동 반납

| 항목 | 내용 |
|------|------|
| **일차 액터** | 모니터링 시스템(SYS) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 하위 기능 |

**주요 성공 시나리오**
1. 시스템 스케줄러가 1분 주기로 본 UC를 시작한다.
2. 시스템이 종료 시각 1시간 전에 해당하는 예약을 조회한다.
3. 사전 알림이 아직 발송되지 않았으면 학생(STU)에게 "1시간 후 만료" 알림을 보낸다.
4. 시스템이 종료 시각이 지난 예약을 조회한다.
5. 시스템이 Reservation.status = EXPIRED, Server.status = AVAILABLE, version 증가, Quota.used 감소를 트랜잭션으로 처리한다.
6. 시스템이 학생(STU)에게 만료 완료 알림을 발송한다.
7. 해당 서버 대기열에 사용자가 있으면 즉시 서버 요청(UC05) 흐름으로 자동 할당을 시도한다.

**확장·실패 시나리오**
- **[A1] 조기 반납** — 서버 반납(UC07)이 종료 시각 전에 실행되면 본 UC 처리 대상에서 제외된다.
- **[E1] 낙관적 잠금 충돌** — 서버 반납(UC07)이나 유휴 서버 감지 및 자동 회수(UC15)와 경합 시 충돌이 감지되면 처리 없이 종료한다.
- **[E2] 대기열 할당 실패** — Quota 부족 등으로 자동 할당에 실패하면 알림만 발송하고 넘어간다.

### 유스케이스 UC17 — 승인 타임아웃 (자동 거절)

| 항목 | 내용 |
|------|------|
| **일차 액터** | 모니터링 시스템(SYS) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 하위 기능 |

**주요 성공 시나리오**
1. 시스템 스케줄러가 일정 주기로 본 UC를 시작한다.
2. 시스템이 요청 후 72시간이 지났는데도 PENDING인 ApprovalRequest를 조회한다.
3. 시스템이 status = AUTO_REJECTED, decidedAt = now, decidedBy = SYSTEM으로 변경한다 (트랜잭션).
4. 시스템이 학생(STU)에게 "승인 기간 만료 - 자동 거절" 알림을 발송한다.
5. 시스템이 팀 관리자(MGR)에게도 "미응답으로 자동 거절 처리됨" 알림을 발송한다.
6. 호출 UC였던 서버 예약 요청(UC04) 또는 즉시 서버 요청(UC05)은 최종 실패로 확정된다.

**확장·실패 시나리오**
- **[A1] 마감 직전 허가** — 팀 관리자(MGR)가 초과 요청 승인/거절(UC09)을 완료하면 status가 이미 APPROVED/REJECTED이므로 본 UC의 조회 대상에서 자동 제외된다.
- **[E1] 허가와 동시 경합** — 초과 요청 승인/거절(UC09)과 동시에 처리를 시도하면 SELECT FOR UPDATE 또는 status 조건 검사로 한 건만 성공한다.
- **[E2] 알림 채널 오류** — status 전이는 유지하고 알림은 별도 재시도 큐로 보낸다.
- **[E3] ADM 대리 허가 모드** — 서버 관리자(ADM)가 대리 허가자로 지정된 경우 72시간 타이머는 서버 관리자(ADM)에게도 동일하게 적용된다.

### 유스케이스 UC18 — 서버 이상 징후 탐지 [AIOps 핵심]

| 항목 | 내용 |
|------|------|
| **일차 액터** | 모니터링 시스템(SYS) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 하위 기능 |

**주요 성공 시나리오**
1. 시스템 스케줄러가 5분 주기로 본 UC를 시작한다.
2. 시스템이 IN_USE 상태인 각 서버의 최근 7일 CPU·메모리 사용률 시계열을 조회한다.
3. 각 서버의 7일 이동 평균(μ)과 표준편차(σ)를 계산한다.
4. 최근 수집값이 μ ± 2σ 범위를 벗어나면 해당 서버를 이상 징후 서버로 표시한다.
5. 이상 징후 서버명·편차 수치·발생 시각을 ADM에게 알림으로 발송한다.
6. 이상 징후 이력을 저장한다 (UC19 건강 점수의 입력으로).

**확장·실패 시나리오**
- **[A1] 지속 이상** — 24시간 내 3회 이상 발생 시 ADM에게 "반복 이상 징후" 경고를 별도 발송한다.
- **[E1] 데이터 부족** — 서버 등록 7일 미만이면 데이터가 부족하므로 산출 결과를 보여주지 않고 "불완전" 표시를 붙인다.
- **[E2] 처리 실패** — 스케줄러 오류 시 다음 주기에 재시도하고 운영 로그를 남긴다.

### 유스케이스 UC19 — 서버 건강 점수 산출

| 항목 | 내용 |
|------|------|
| **일차 액터** | 모니터링 시스템(SYS) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 하위 기능 |

**주요 성공 시나리오**
1. 시스템 스케줄러가 10분 주기로 본 UC를 시작한다.
2. 시스템이 서버별로 3가지 지표를 수집한다:
   - ① 최근 1시간 평균 CPU·메모리 사용률
   - ② 최근 24시간 메트릭 누락 횟수(UC14)
   - ③ 최근 7일 이상 징후 발생 횟수(UC18)
3. 각 지표를 0~100으로 환산한 뒤 가중 평균으로 건강 점수(Health Score)를 산출한다 (가중치: 사용률 50%, 누락 30%, 이상 징후 20%).
4. 계산된 점수를 서버 레코드에 기록한다.
5. 점수가 40 미만이면 ADM에게 "점검 권고" 알림을 발송한다.

**확장·실패 시나리오**
- **[A1] 현황 연동** — 서버 현황 조회(UC01)에서 ADM에게 건강 점수와 상태 배지(정상/주의/위험)가 표시된다.
- **[A2] 점검 전환 권고** — 점수 20 미만 서버에는 ADM에게 "MAINTENANCE 전환" 권장 메시지를 알림으로 보낸다.
- **[E1] 지표 일부 누락** — 수집 불가 지표가 발생한다면, 이를 제외하고 나머지로만 산출하되 "불완전" 표시를 붙인다.
- **[E2] 신규 서버** — 등록 후 1시간 미만이면 데이터가 부족하므로 산출 결과를 보여주지 않고 마찬가지로 "불완전" 표시를 붙인다.

## 보안·운영 그룹

시스템 보안을 담당하는 그룹이다. UC20은 짧은 시간 안에 요청을 비정상적으로 많이 보내거나 권한 없는 경로를 반복해서 보내는 계정을 감지해 일시적으로 잠근다. (Rate Limiting)

UC21은 서버 관리자가 스케줄러 실행 상태, 메트릭 수집 현황, 자동 처리 내역, 서버 건강 점수 분포를 한 화면에서 볼 수 있는 운영 대시보드이다.

### 유스케이스 UC20 — 비정상 접근 감지 및 일시 잠금(락)

| 항목 | 내용 |
|------|------|
| **일차 액터** | 모니터링 시스템(SYS) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 하위 기능 |

**주요 성공 시나리오**
1. 사용자 요청마다 시스템이 해당 사용자의 최근 1분간 요청 이력을 집계한다.
2. 아래 조건 중 하나 이상을 만족하면 비정상 접근으로 판정한다: ① 1분 내 예약·취소 요청 RATE_LIMIT_REQUEST회 초과, ② 1분 내 403 응답 RATE_LIMIT_FORBIDDEN회 연속 발생.
3. 시스템이 해당 계정을 LOCK_DURATION(예: 15분) 동안 일시 잠근다.
4. 잠금된 사용자에게 잠금 사실과 해제 예정 시각을 안내한다.
5. ADM에게 비정상 접근 감지 알림(대상 계정·판정 패턴·시각)을 발송한다.
6. 잠금 이벤트를 감사 로그에 기록한다.

**확장·실패 시나리오**
- **[A1] 반복 잠금** — 24시간 내 3회 이상 잠금 발생 시 자동 해제 없이 ADM 수동 해제 전까지 잠금 유지.
- **[A2] ADM 수동 해제** — ADM이 감사 로그에서 해당 계정을 즉시 해제할 수 있다.
- **[E1] 잠금 중 재요청** — 잠금 상태 사용자의 요청은 즉시 429로 거부하고 남은 잠금 시간을 안내한다.
- **[E2] 오탐 처리** — ADM이 정상 사용자로 판단하면 즉시 해제하고 잠금 이력에 "오탐 해제" 사유를 기록한다.

### 유스케이스 UC21 — 시스템 운영 대시보드

| 항목 | 내용 |
|------|------|
| **일차 액터** | 서버 관리자(ADM) |
| **범위** | 서버 예약/할당 관리 시스템 |
| **수준** | 사용자 목표 |

**주요 성공 시나리오**
1. ADM이 "시스템 운영" 메뉴를 열면 대시보드가 표시된다.
2. 대시보드는 5개 섹션으로 구성된다:
   - ① **스케줄러 상태** — UC14~UC17 각각의 마지막 실행 시각·성공 여부·처리 건수
   - ② **메트릭 수집 현황** — 최근 10분간 수집 성공률, MISSING 서버 목록
   - ③ **최근 자동 처리 내역** — 24시간 내 유휴 회수·만료 반납·타임아웃 거절 건수 및 목록
   - ④ **건강 점수 요약** — 전체 서버의 정상/주의/위험 분포
   - ⑤ **가용성 현황** — 서버별 업타임·추정 MTBF·추정 MTTR, 건강 점수 하락 추세 기반 예측 위험 서버 목록, 현재 시스템 전체 가용성 달성률(A%)
3. 대시보드는 REALTIME_REFRESH_INTERVAL 주기로 자동 갱신된다.
4. 이상 항목(스케줄러 실패·수집률 저하·위험 서버·가용성 목표 미달)은 빨간 배지로 강조된다.

**확장·실패 시나리오**
- **[A1] 드릴다운** — 각 항목 클릭 시 영향받은 서버·사용자·처리 시각 상세 목록을 확인할 수 있다.
- **[A2] 알림 연동** — 대시보드에서 감지된 이상 항목은 ADM 알림함에도 동시 표시된다.
- **[A3] 가용성 드릴다운** — 가용성 현황 섹션에서 서버를 선택하면 해당 서버의 업타임 시계열, 과거 장애 이력, MTBF·MTTR 추이 그래프를 확인할 수 있다. 건강 점수 하락 추세가 임계값을 넘은 서버는 "예측 위험" 배지로 강조된다.
- **[E1] 섹션 조회 실패** — 해당 섹션에 "데이터 없음"을 표시하고 나머지 섹션은 정상 표시한다.
- **[E2] 권한** — ADM 전용 메뉴로, MGR(팀 매니저), STU(학생) 접근 시 403으로 거부한다.
- **[E3] 가용성 데이터 부족** — scheduler_log 누적 시간이 24시간 미만이면 MTBF·MTTR을 N/A로 표시하고 "데이터 수집 중" 안내를 덧붙인다. (데이터의 부족으로 인해 정확성을 보증할 수 없기 때문이다.)

## 부록 A — 구현 메모

본 부록은 본문(유스케이스 명세) 수준에서는 추상화된 구현 디테일을 모아둔 섹션입니다.

(서버 Health 수치 공식, 트랜잭션 관련 로직 등을 정리하였습니다.)

### A.1  UC04 — 예약 요청 SQL

낙관적 잠금 UPDATE 조건: `WHERE id=? AND version=?`. 영향 행이 0이면 충돌로 판정한다.

설명: 예약 화면을 연 시점의 version(예: 42)을 기억해뒀다가, 저장할 때 "ID도 같고 version도 42인 행"을 찾는다. 누군가 먼저 예약해서 version이 43으로 바뀌어 있으면 검색 결과가 0건이 되어 내 요청은 실패한다.

### A.2  UC08 — ApprovalRequest 필드

생성 시 채우는 필드: `requesterId`, `approverId(=팀의 MGR)`, `requestedAt = now`, `reason`, `status = PENDING`.

설명: 학생이 "Quota 초과 승인 요청"을 누르면 DB에 기록된다. 누가 요청했는지(requesterId), 누가 허가해야 하는지(approverId), 언제 요청했는지(requestedAt), 왜 필요한지(reason), 현재 상태(status - 처음엔 항상 PENDING)가 속성으로 들어간다.

### A.3  UC09 / UC17 — 허가 동시성

허가(UC09)와 타임아웃(UC17)의 동시 발생은 `SELECT FOR UPDATE` 또는 `status = 'PENDING'` 가드 조건으로 1건만 성공하도록 제어한다.

설명: 72시간이 거의 다 됐을 때 MGR이 막 "승인" 버튼을 누르고, 시스템이 동시에 "타임아웃이니 자동 거절"을 처리하는 경쟁 상태를 막는 방법이다. (1) SELECT FOR UPDATE로 허가 카드를 잠그거나, (2) UPDATE 시 `WHERE status = 'PENDING'` 조건을 붙여서 아직 처리 안 된 카드만 변경한다. 둘 중 한 명만 성공한다.

### A.4  UC09 — 허가 기록 필드

상태 전이 시 함께 기록: `decidedAt = now`, `decidedBy`.

설명: 허가 카드의 상태가 PENDING → APPROVED(또는 REJECTED)로 바뀔 때, 언제(decidedAt)·누가(decidedBy) 결정했는지를 함께 기록한다. 사후 감사에 필요한 흔적이다.

### A.5  UC15 — 회수 예정 시각 및 트랜잭션

- 회수 예정 시각: 알림 발송 시각 + IDLE_WARNING_GRACE (예시: 15분).
- 회수 트랜잭션: `Reservation.status = RECLAIMED`, `Server.status = AVAILABLE`, `Server.version += 1`, `Quota.used -= 점유량`.

설명: 서버가 30분간 거의 안 쓰이면 즉시 회수하는 게 아니라, 먼저 "15분 후에 회수합니다" 경고를 보낸다. 15분이 지나도 여전히 유휴라면 4가지 변경을 한 트랜잭션으로 처리한다: (1) 예약 상태 → RECLAIMED, (2) 서버 상태 → AVAILABLE, (3) version +1, (4) Quota.used 감소. 하나라도 실패하면 전부 원상복구된다.

### A.6  UC01 / UC12 — 감사 로그

- UC01: 조회 이벤트 로그를 ADM·MGR 권한 한정으로 로그를 기록한다.
- UC12: soft delete(`deletedAt = now`) 시 감사 로그를 기록한다.

설명: 감사 로그(audit log)는 "누가·언제·무엇을 했는지"를 별도로 기록해두는 흔적이다. 학생의 조회까지 전부 기록하면 양이 너무 많으므로 관리자급(ADM·MGR)이 조회할 때만 기록한다.

### A.7  UC18 — 이상 징후 판정 조건식

- 이상 징후 판정: `|current_avg - μ| > 2σ` (μ = 7일 이동 평균, σ = 표준편차).
- 7일 미만 데이터는 처리 대상에서 제외한다.
- 이상 징후 이력은 `AnomalyRecord` 엔티티로 저장한다 (`serverId`, `detectedAt`, `currentValue`, `mean`, `stddev`).

설명: 단순 고정 임계값 계산 방식 대신 서버마다의 평소 패턴을 학습해 그 패턴에서 크게 벗어날 때만 경고를 낸다. 예를 들어 평소 CPU를 70% 쓰는 서버라면 50%로 떨어져도 이상이고, 평소 10%밖에 안 쓰는 서버라면 30%만 넘어도 이상으로 판정할 수 있다. (다만 전자의 경우에는 이상이 아님에도 이상으로 탐지하는 오탐 현상의 가능성 또한 생기기 때문에, 이 부분에 대해서는 이후 설계 과정에서 방법을 모색하고 수정하는 과정이 필요할 것으로 보인다.)

### A.8  UC19 — Health 점수 공식

**패널티 변환**

| 지표 | 변환식 | 상한 |
|------|--------|------|
| P_usage | `clamp((u – 60) × 2.5, 0, 100)` | 100%에서 상한. 60% 이하는 0 |
| P_missing | `min(m × 10, 100)` | 10회 이상이면 100 |
| P_anomaly | `min(a × 20, 100)` | 5건 이상이면 100 |

**Health 점수 공식**

```
score = round(100 − (P_usage × 0.5 + P_missing × 0.3 + P_anomaly × 0.2))
```

**등급 기준**

| 점수 | 등급 | 조치 |
|------|------|------|
| 70 이상 | 정상 | 없음 |
| 40 ~ 69 | 주의 | ADM 대시보드 경고 배지 |
| 40 미만 | 위험 | ADM에게 "점검 권고" 알림 발송 |
| 20 미만 | 위험 | 위 알림 + MAINTENANCE 전환 버튼 노출 |

**계산 예시 (예: CPU 90%, 누락 5회, 이상 징후 4회)**

```
P_usage   = clamp((90 − 60) × 2.5, 0, 100) = 75
P_missing = min(5 × 10, 100)               = 50
P_anomaly = min(4 × 20, 100)               = 80

weighted  = 75 × 0.5 + 50 × 0.3 + 80 × 0.2
          = 37.5    + 15.0     + 16.0
          = 68.5

score = round(100 − 68.5) = 32점  →  위험
```

건강 점수는 `Server` 테이블의 `healthScore` 필드에 저장한다.

### A.14  UC20 — 비정상 접근 판정 및 잠금

"1분 안에 예약·취소를 정책 횟수 이상 시도"하거나 "권한 없는 URL 엔드포인트에 계속하여 접근을 시도하는" 행동을 비정상으로 보고 계정을 15분간 잠근다. 잠금 상태인 사람의 모든 요청은 "429 Too Many Requests"로 거부된다.

### A.15  UC21 — 운영 대시보드 데이터 소스

- 각 SYS 스케줄러(UC14~UC19)는 실행 결과를 `scheduler_log` 테이블에 기록한다 (`ucId`, `executedAt`, `success`, `processedCount`).
- 대시보드는 이 테이블과 `AnomalyRecord`, `Server.healthScore`를 집계 조회한다.
- ADM 전용 API 엔드포인트로 제공하며, 인가(authorization) 검사를 반드시 거쳐야 한다.

설명: 대시보드가 표시하는 모든 정보는 각 스케줄러가 실행될 때마다 `scheduler_log` 테이블에 한 줄씩 쌓아두는 기록에서 나온다. ADM이 대시보드를 열면 이 기록을 종합해 "UC15가 오늘 몇 번 회수했는지", "UC14가 최근에 실패했는지" 같은 정보를 한눈에 볼 수 있다.

## 부록 B — 가용성 설계 및 AIOps 연계

본 부록은 UC18·UC19 기반의 AIOps 접근으로 서버의 상태를 지속적으로 분석 및 이상 징후를 파악, 장애가 일어나기 전 사전에 회피함으로써 가용성을 예측적으로 향상시키는 원리를 설명합니다.

### B.0  개요

가용성(Availability)은 시스템이 주어진 시간 동안 정상적으로 동작하는 비율이다. 이 부록은 본 시스템의 가용성 목표를 수식으로 정의하고, 현재 설계의 각 기법이 가용성에 어떻게 기여하는지 설명한다.

부록 A(구현 메모)가 "어떻게 동작하는가"를 다룬다면, 부록 B는 "얼마나 안정적으로 동작하는가"를 다룬다.

### B.1  AIOps 연계 – 예측적 가용성 관리

일반적인 가용성 설계가 장애가 발생한 후 빠르게 복구하는 것(MTTR 단축)에 초점을 맞춘다면, AIOps 접근은 장애가 발생하기 전에 신호를 감지하고 사전 조치해서 MTBF 자체를 늘린다. UC18(이상 징후 탐지)과 UC19(건강 점수 산출)가 이 역할을 담당한다.

**시나리오**

1. **UC14** → 1분 주기 CPU·메모리·네트워크 사용률 수집
2. **UC18** → 7일 이동 평균(μ)·표준편차(σ) 기반 이상 탐지: `|current - μ| > 2σ`
3. **UC19** → 건강 점수 산출: `score = 100 − (P_usage × 0.5 + P_missing × 0.3 + P_anomaly × 0.2)`
4. `score < 40` → ADM(관리자)에게 "점검 권고" 알림 발송
5. ADM이 UC13으로 MAINTENANCE 전환 → 이 경우 가용성이 떨어질 수 있으나, Failure가 일어나 더 큰 손해를 보기 전 미리 서버를 유지보수하여 최소한의 가용성 손해를 보게 하려는 의도입니다.

### B.5  UC21 가용성 현황 섹션 – 데이터 소스 및 산출 방식

UC21 대시보드의 5번째 섹션(가용성 현황)이 표시하는 각 지표가 어디서 오는지 정의한다.

| 지표 | 산출 방식 |
|------|-----------|
| **서버별 업타임** | `uptime(%) = (조회 기간 - 장애 누적 시간) / 조회 기간 × 100`. 장애 시간은 `scheduler_log`에서 SYS가 회수(RECLAIMED), 만료(EXPIRED) 처리한 행과 `server.status = MAINTENANCE` 구간을 합산해 산출한다. |
| **추정 MTBF** | `MTBF_est = 정상 운영 누적 시간 / 장애 발생 건수`. |
| **추정 MTTR** | `MTTR_est = 장애 발생~복구(status → AVAILABLE) 구간의 평균 시간`. `server.status` 변경 이력과 타임스탬프를 기준으로 계산. |
| **가용성 달성률 A(%)** | `A = MTBF_est / (MTBF_est + MTTR_est) × 100`. 서버별로 산출한 뒤, 전체 서버의 가중 평균(가중치: 예약 빈도)으로 시스템 전체 A(%)를 표시. |
