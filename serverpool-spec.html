  <script id="md-source" type="text/markdown"># 서버 예약/할당 관리 시스템

## 서버 풀 명세서 (server-pool)

엔드포인트 2종 / 수집기 4종 / 메트릭 계약 1종

> 대상 레포: `server-pool` — 백엔드(`backend`)가 1분 주기로 PULL해 가는 모니터링 대상 서버 풀.
> 단일 출처(SSOT): 데이터 모델은 Notion `데이터 모델 (ERD)`, 아키텍처는 Notion `시스템 설계`.
> 백엔드 명세(기능/API)와는 **별도 문서**이며, 추적성은 UC 번호와 `ServerMetric` 엔티티로 연결한다.

---

## 1. 개요

`server-pool`은 백엔드가 사용률을 수집해 갈 **대상 서버들**을, 한 종류의 경량 에이전트 이미지를 컨테이너 N개로 띄워 시뮬레이션한다. 기본 3대(`agent-1`·`agent-2`·`agent-3`)가 호스트 포트 `9101`·`9102`·`9103`을 점유한다.

각 에이전트는 `/health`와 `/metrics`만 노출하는 **상태 없는 경량 프로세스**다. 인증·권한·DB가 없으며, 사람 사용자가 직접 호출하지 않는다. 호출 주체는 백엔드의 자동화 액터 **SYS**(APScheduler)뿐이며, 1분 주기로 `/metrics`를 PULL해 `ServerMetric` 시계열로 저장한다(UC14).

> 설계 원칙: 에이전트는 백엔드와 의존성을 공유하지 않고 경량을 우선한다. 메트릭 JSON 계약은 이 문서를 단일 출처로 삼으며, 에이전트 레포는 계약을 임의로 바꾸지 않는다.

---

## 2. 아키텍처 위치

백엔드 스택과 서버 풀 스택은 **독립 Docker Compose**로 분리된다. 수집은 백엔드 → 서버 풀 방향의 단방향 PULL이다.

```text
[backend compose]                         [server-pool compose]
  api (FastAPI :8000)                       agent-1 (:9101)  ── GET /metrics, /health
  scheduler (APScheduler, SYS) ──┐          agent-2 (:9102)  ── GET /metrics, /health
  postgres (:5432)               │          agent-3 (:9103)  ── GET /metrics, /health
  redis (:6379)                  │
        1분 주기 PULL ───────────┘ host.docker.internal:9101..9103
```

| 항목 | 값 |
|------|-----|
| 노출 포트 | 9101 – 9103 (에이전트당 1개, compose에서 `SERVER_ID`·`PORT` 주입) |
| 통신 | REST (HTTP GET), 내부망 |
| 호출 주체 | 백엔드 SYS 수집기(APScheduler) |
| 수집 주기 | 60초 (백엔드 `SCHEDULER_INTERVAL_SEC`) |

---

## 3. 기능 명세

기능은 백엔드 명세와 동일하게 **구현 단위(연산 입도)**로 쪼갠다. 상태 의미: `미정의 → 정의완료(역할·입출력 합의) → 구현완료(머지+동작)`.

| 기능 이름 | 기능 역할 | 도메인 | 관련 UC | 관련 API | 상태 |
|-----------|-----------|--------|---------|----------|------|
| 헬스 응답 | 컨테이너 생존 확인용 200 응답 | 엔드포인트 | — | `GET /health` | 구현완료 |
| 메트릭 스냅샷 노출 | 현재 시점 cpu/mem/gpu/net 사용률을 JSON으로 노출 | 노출 | UC14 | `GET /metrics` | 구현완료 |
| CPU 사용률 수집 | psutil로 CPU 사용률 측정 (`collectors/cpu.py`) | 수집 | UC14 | (`GET /metrics`) | 구현완료 |
| 메모리 사용률 수집 | psutil로 메모리 사용률 측정 (`collectors/memory.py`) | 수집 | UC14 | (`GET /metrics`) | 구현완료 |
| GPU 사용률 수집 | GPU 사용률. 시뮬레이션은 `GPU_SIMULATE` 합성, 미탑재 시 null (`collectors/gpu.py`) | 수집 | UC14 | (`GET /metrics`) | 구현완료 |
| 네트워크 사용률 수집 | NIC 대역폭(`NET_CAP_MBPS`) 대비 사용률 측정 (`collectors/net.py`) | 수집 | UC14 | (`GET /metrics`) | 구현완료 |
| 장애·부하 시연 (참고) | `stress-ng`·`hey`·`docker pause/stop`로 **외부에서** 유발. 에이전트 코드가 아닌 운영 명령 | 운영시연 | UC15 · UC18 | — | 정의완료 |

> `collectors/`(cpu·memory·net·gpu)와 실제 `/metrics` 산출이 구현되었다. cpu·memory·net은 **psutil 실측**(stress-ng·hey 부하가 그대로 반영됨), gpu는 시뮬레이션 환경에 물리 GPU가 없어 **`GPU_SIMULATE` 합성값**(끄면 null)을 낸다. 범위·타입 단위 테스트는 `tests/test_collectors.py`.

---

## 4. API 명세

두 엔드포인트 모두 통신유형 `REST`, 권한 `SYS`(자동화 수집기만 호출). 인증 헤더 없음(내부망 신뢰).

### 4.1  GET /health

컨테이너가 살아 있는지 확인하는 헬스 체크. 상태: **구현완료**.

- **요청**: 파라미터·바디 없음
- **응답 200**:

```json
{ "status": "ok" }
```

- 에러: 없음 (프로세스가 살아 있으면 항상 200)

### 4.2  GET /metrics

현재 시점의 자원 사용률 스냅샷. 백엔드 SYS 수집기가 1분 주기로 PULL한다. 상태: **구현완료**(cpu·mem·net psutil 실측 · gpu 합성).

- **요청**: 파라미터·바디 없음
- **응답 200**:

```json
{
  "serverId": 1,
  "collectedAt": "2026-06-01T09:00:00Z",
  "cpuUsage": 37.5,
  "memUsage": 61.2,
  "gpuUsage": 88.0,
  "netUsage": 12.4,
  "status": "OK"
}
```

| 필드 | 타입 | 의미 |
|------|------|------|
| `serverId` | int | 에이전트 식별자(`SERVER_ID`). 백엔드 `server.id`와 매핑 |
| `collectedAt` | string (ISO-8601 UTC) | 수집 시각. 백엔드 `ServerMetric.collectedAt`에 대응 |
| `cpuUsage` | float (0–100 %) | CPU 사용률 (psutil 실측) |
| `memUsage` | float (0–100 %) | 메모리 사용률 (psutil 실측) |
| `gpuUsage` | float (0–100 %) \| null | GPU 사용률. `GPU_SIMULATE=false`거나 미탑재면 `null` |
| `netUsage` | float (0–100 %) | NIC 대역폭(`NET_CAP_MBPS`) 대비 사용률 |
| `status` | string | 에이전트 수집 상태. **응답하는 한 항상 `"OK"`** |

- 에러 **500**: 수집기 내부 오류 시 (정상 시뮬레이션에서는 발생하지 않음)

> **`status` 계약.** 에이전트는 자신의 예약 상태(AVAILABLE 등)를 모른다 — 그것은 백엔드의 도메인이다. 따라서 `/metrics`의 `status`는 **수집 품질**만 나타내며 에이전트는 항상 `"OK"`를 반환한다. `MISSING`(무응답)·`NA`(항목 미지원)는 **백엔드 수집기가 판정**해 `ServerMetric.status`에 기록한다(백엔드 `MetricStatus` enum).

---

## 5. 백엔드 연계 · 추적성

`/metrics` 1회 응답은 백엔드에서 `ServerMetric` **1행**으로 저장된다(UC14 "실시간 사용률 수집", 1분 주기 PULL · 검증 · 시계열 저장).

| `/metrics` 필드 | `ServerMetric` 컬럼 | 비고 |
|-----------------|---------------------|------|
| `serverId` | `server_id` (FK) | 에이전트 ↔ 등록 서버 매핑 |
| `collectedAt` | `collected_at` | 시계열 인덱스 |
| `cpuUsage` | `cpu_usage` | |
| `memUsage` | `mem_usage` | |
| `netUsage` | `net_usage` | |
| `gpuUsage` | `gpu_usage` | nullable. 마이그레이션 `0002`로 추가 |
| `status` | `status` | `MetricStatus`(OK/MISSING/NA). 에이전트는 OK만, 나머지는 백엔드 판정 |

이 메트릭은 백엔드 자동화 잡의 입력이 된다 — 유휴 회수(UC15), 이상 탐지(UC18, 7일 이동평균 ±2σ), 건강 점수(UC19).

> **ERD 확장 반영 완료.** GPU 공유가 이 시스템의 핵심이므로 `/metrics`는 `gpuUsage`를 노출한다. `ServerMetric.gpu_usage (float, nullable)` 컬럼을 추가(마이그레이션 `0002_add_gpu_usage`)하고, 수집 상태는 `MetricStatus(OK/MISSING/NA)` enum으로 정렬했다. Notion `데이터 모델 (ERD)`에도 반영했다.

---

## 6. 후속 과제 (미구현)

- 실제 GPU 노드 연동 — 현재는 시뮬레이션 환경 특성상 `GPU_SIMULATE` 합성값
- `agent/scripts/scenarios/` — 장애·부하 재현 스크립트 묶음
- 백엔드 수집기(APScheduler) 측 실제 PULL·검증·시계열 저장 잡(UC14)
